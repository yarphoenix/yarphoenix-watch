name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required for the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Match the Node/npm major used locally (npm 11) so `npm ci` resolves
          # the same dependency tree the committed lockfile was generated with.
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # CRA turns ESLint warnings into errors when CI is set; keep warnings non-fatal.
          CI: false
          # OMDb key for live data. NOTE: CRA inlines REACT_APP_* into the public
          # client bundle, so on this public repo the key is visible in the deployed
          # site's JS. Acceptable for a free, low-risk OMDb key.
          REACT_APP_OMDB_KEY: ${{ secrets.REACT_APP_OMDB_KEY }}
          # Kinopoisk key for the Russian catalogue (same public-bundle caveat).
          # If the secret is unset, the RU version falls back to the local catalogue.
          REACT_APP_KINOPOISK_KEY: ${{ secrets.REACT_APP_KINOPOISK_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
