<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="A black-and-white catalogue of films and series — browse and search titles, with details from OMDb."
    />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Yarphoenix Movies — Catalogue of films &amp; series</title>
	  <link rel="preconnect" href="https://fonts.googleapis.com">
	  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Hanken+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
	  <style>
		  :root {
			  --bg: #ffffff;
			  --ink: #0b0b0b;
			  --paper: #fafafa;
			  /* overridden by tweaks */
			  --ui-font: 'Hanken Grotesk', system-ui, sans-serif;
			  --line: #e6e6e6;
			  --muted: #8a8a8a;
			  --radius: 4px;
		  }

		  * { box-sizing: border-box; }
		  html, body { margin: 0; padding: 0; }
		  body {
			  background: var(--bg);
			  color: var(--ink);
			  font-family: var(--ui-font);
			  -webkit-font-smoothing: antialiased;
			  text-rendering: optimizeLegibility;
		  }
		  button { font-family: inherit; cursor: pointer; }
		  input { font-family: inherit; }
		  ::selection { background: var(--ink); color: #fff; }

		  .wordmark {
			  font-family: 'Microgramma', 'Space Grotesk', sans-serif;
			  text-transform: uppercase;
			  letter-spacing: 0.04em;
			  line-height: 1;
		  }

		  ::-webkit-scrollbar { width: 10px; height: 10px; }
		  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }
		  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

		  #root { min-height: 100vh; }

		  @keyframes fadeUp {
			  from { transform: translateY(10px); }
			  to { transform: translateY(0); }
		  }
		  @keyframes fadeIn { from { transform: translateY(4px); } to { transform: translateY(0); } }

	  </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
