<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="light dark" />
    <script>
      /* FOUC guard: apply the saved (or system) theme to <html> before first
         paint, so a pinned dark theme doesn't flash white on load. */
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (t === 'dark') document.documentElement.classList.add('theme-dark');
          var m = document.querySelector('meta[name="color-scheme"]');
          if (m) m.setAttribute('content', t);
        } catch (e) {}
      })();
    </script>
    <meta
      name="description"
      content="A black-and-white catalogue of films and series — browse and search titles, with details from OMDb."
    />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Yarphoenix Films — Catalogue of films &amp; series</title>
	  <link rel="preconnect" href="https://fonts.googleapis.com">
	  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Hanken+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
	  <style>
		  :root {
			  color-scheme: light;
			  --bg: #ffffff;
			  --ink: #0b0b0b;
			  --paper: #fafafa;
			  --ui-font: 'Hanken Grotesk', system-ui, sans-serif;
			  /* Display/heading face. Russian overrides it below (see [lang="ru"]). */
			  --display-font: 'Space Grotesk', system-ui, sans-serif;
			  --line: #e6e6e6;
			  --muted: rgba(255, 255, 240, 0.8);
			  --radius: 4px;
			  /* Liquid-glass tokens (theme-switched) + sticky surface colour.
			     Light theme reads over the pale inverted aurora. */
			  --glass-blur: blur(16px) saturate(1.4);
			  --glass-blur-soft: blur(12px) saturate(1.4);
			  --glass-bg: rgba(255, 255, 255, 0.45);
			  --glass-bg-hover: rgba(255, 255, 255, 0.62);
			  --glass-border: rgba(0, 0, 0, 0.08);
			  --glass-border-hover: rgba(0, 0, 0, 0.14);
			  --glass-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6), 0 4px 18px rgba(0, 0, 0, 0.06);
			  --surface-bg: rgba(255, 255, 255, 0.72);
		  }
		  /* Dark theme tokens — toggled by adding .theme-dark to <html>. */
		  :root.theme-dark {
			  color-scheme: dark;
			  --bg: #05060a;
			  --ink: #f4f4f5;
			  --paper: rgba(255, 255, 255, 0.06);
			  --line: rgba(255, 255, 255, 0.3);
			  --muted: rgba(255, 255, 255, 0.5);
			  --glass-blur: blur(16px) saturate(1.5);
			  --glass-blur-soft: blur(12px) saturate(1.5);
			  --glass-bg: rgba(255, 255, 255, 0.07);
			  --glass-bg-hover: rgba(255, 255, 255, 0.12);
			  --glass-border: rgba(255, 255, 255, 0.16);
			  --glass-border-hover: rgba(255, 255, 255, 0.28);
			  --glass-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22), 0 6px 24px rgba(0, 0, 0, 0.18);
			  --surface-bg: rgba(8, 10, 16, 0.55);
		  }
		  /* Russian: swap the Space Grotesk display face for PP Neue Machina
		     (LanguageContext sets <html lang="ru">). */
		  :root[lang="ru"] {
			  --display-font: 'PP Neue Machina', 'Space Grotesk', system-ui, sans-serif;
		  }

		  * { box-sizing: border-box; }
		  html, body { margin: 0; padding: 0; }
		  /* Solid base colour behind the fixed aurora canvas (and the no-WebGL
		     fallback); the body is transparent so the field shows through. */
		  html { background: var(--bg); }
		  body {
			  background: transparent;
			  color: var(--ink);
			  font-family: var(--ui-font);
			  -webkit-font-smoothing: antialiased;
			  text-rendering: optimizeLegibility;
		  }
		  button { font-family: inherit; cursor: pointer; }
		  input { font-family: inherit; }
		  ::selection { background: var(--ink); color: var(--bg); }

		  .wordmark {
			  font-family: 'Microgramma', var(--display-font);
			  text-transform: uppercase;
			  letter-spacing: 0.04em;
			  line-height: 1;
		  }

		  ::-webkit-scrollbar { width: 10px; height: 10px; }
		  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }
		  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

		  #root { min-height: 100vh; }

		  @keyframes fadeUp {
			  from { transform: translateY(10px); }
			  to { transform: translateY(0); }
		  }
		  @keyframes fadeIn { from { transform: translateY(4px); } to { transform: translateY(0); } }

	  </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
